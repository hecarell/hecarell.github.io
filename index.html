<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 Plant Life Cycle 🌻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', cursive;
    overflow: hidden;
    height: 100vh;
    user-select: none;
    background: #87CEEB;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(180deg, #4FC3F7 0%, #81D4FA 40%, #B3E5FC 100%);
    transition: background 1s;
  }

  .sky.night {
    background: linear-gradient(180deg, #1a237e 0%, #283593 40%, #3949ab 100%);
  }

  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, #6D4C41 0%, #5D4037 10%, #4E342E 100%);
    border-top: 8px solid #388E3C;
  }

  .grass {
    position: absolute;
    top: -30px; left: 0; right: 0;
    height: 60px;
    overflow: hidden;
  }

  .grass-blade {
    position: absolute;
    bottom: 0;
    width: 14px;
    height: 40px;
    background: #43A047;
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    animation: sway 3s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 30px;
    right: 60px;
    width: 100px;
    height: 100px;
    background: #FFD54F;
    border-radius: 50%;
    box-shadow: 0 0 60px #FFD54F, 0 0 120px #FFE082;
    animation: pulse-sun 4s ease-in-out infinite;
    cursor: pointer;
    z-index: 5;
    transition: all 1s;
  }

  .sun.draggable { cursor: grab; }
  .sun.dragging { cursor: grabbing; z-index: 100; animation: none; }

  .sun:hover { transform: scale(1.1); }

  .sun-face {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    line-height: 1;
  }

  .sun-rays {
    position: absolute;
    inset: -20px;
    animation: spin-slow 20s linear infinite;
  }

  .sun-ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 4px;
    height: 24px;
    background: #FFD54F;
    border-radius: 2px;
    transform-origin: center 0;
    opacity: 0.6;
  }

  @keyframes spin-slow { to { transform: rotate(360deg); } }

  @keyframes pulse-sun {
    0%, 100% { box-shadow: 0 0 60px #FFD54F, 0 0 120px #FFE082; }
    50% { box-shadow: 0 0 80px #FFCA28, 0 0 160px #FFD54F; }
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.9;
  }

  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }

  .cloud-1 {
    width: 120px; height: 40px;
    top: 60px; left: 10%;
    animation: float-cloud 20s linear infinite;
  }
  .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
  .cloud-1::after { width: 70px; height: 55px; top: -30px; left: 45px; }

  .cloud-2 {
    width: 150px; height: 45px;
    top: 100px; left: 50%;
    animation: float-cloud 25s linear infinite reverse;
  }
  .cloud-2::before { width: 60px; height: 55px; top: -28px; left: 25px; }
  .cloud-2::after { width: 80px; height: 60px; top: -35px; left: 55px; }

  .cloud-3 {
    width: 100px; height: 35px;
    top: 30px; left: 70%;
    animation: float-cloud 30s linear infinite;
  }
  .cloud-3::before { width: 45px; height: 45px; top: -22px; left: 15px; }
  .cloud-3::after { width: 55px; height: 48px; top: -26px; left: 40px; }

  @keyframes float-cloud {
    0% { transform: translateX(-300px); }
    100% { transform: translateX(calc(100vw + 300px)); }
  }

  /* Rain */
  .rain-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .rain-container.active { opacity: 1; }

  .raindrop {
    position: absolute;
    width: 3px;
    height: 20px;
    background: linear-gradient(transparent, #64B5F6);
    border-radius: 0 0 5px 5px;
    animation: rain-fall 1s linear infinite;
  }

  @keyframes rain-fall {
    0% { transform: translateY(-20px); opacity: 1; }
    100% { transform: translateY(60vh); opacity: 0; }
  }

  /* Plant area */
  .plant-area {
    position: absolute;
    bottom: 38%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 350px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  /* Hole in ground */
  .dirt-hole {
    position: absolute;
    bottom: -20px;
    width: 80px;
    height: 30px;
    background: radial-gradient(ellipse, #3E2723, #4E342E);
    border-radius: 50%;
    transform: scale(0);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .dirt-hole.visible { transform: scale(1); }

  .dirt-pile {
    position: absolute;
    bottom: -6px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .dirt-pile.visible { opacity: 1; }

  .dirt-chunk {
    width: 14px;
    height: 10px;
    background: #6D4C41;
    border-radius: 50%;
  }

  .dirt-chunk:nth-child(2) { width: 18px; height: 12px; transform: translateY(-3px); }

  /* Seed */
  .seed {
    width: 40px;
    height: 50px;
    background: radial-gradient(ellipse, #8D6E63, #5D4037);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    position: absolute;
    bottom: -10px;
    cursor: pointer;
    transition: all 0.5s;
  }

  .seed.bouncing { animation: seed-bounce 2s ease-in-out infinite; }
  .seed.draggable { cursor: grab; }
  .seed.dragging { cursor: grabbing; z-index: 50; }

  .seed::after {
    content: '';
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 12px;
    background: #4E342E;
    border-radius: 2px;
  }

  @keyframes seed-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .seed-planted {
    animation: plant-seed 0.6s ease-in forwards;
  }

  @keyframes plant-seed {
    0% { transform: translateY(0); }
    50% { transform: translateY(10px) scale(0.9); }
    100% { transform: translateY(15px) scale(0.8); opacity: 0.6; }
  }

  /* Roots */
  .roots {
    position: absolute;
    bottom: -45px;
    width: 60px;
    height: 40px;
    opacity: 0;
  }

  .roots.visible { opacity: 1; }

  .root-line {
    position: absolute;
    top: 0;
    left: 50%;
    width: 3px;
    background: #8D6E63;
    border-radius: 0 0 3px 3px;
    transform-origin: top center;
    height: 0;
    transition: height 1.5s ease-out;
  }

  .root-line.grown { height: 35px; }
  .root-line:nth-child(1) { transform: translateX(-50%) rotate(-30deg); }
  .root-line:nth-child(2) { transform: translateX(-50%) rotate(0deg); }
  .root-line:nth-child(3) { transform: translateX(-50%) rotate(30deg); }

  .root-branch {
    position: absolute;
    bottom: 0;
    width: 2px;
    height: 12px;
    background: #A1887F;
    border-radius: 0 0 2px 2px;
  }

  .root-branch.left { left: -4px; transform: rotate(-25deg); }
  .root-branch.right { right: -4px; transform: rotate(25deg); }

  /* Sprout */
  .sprout {
    position: absolute;
    bottom: -5px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stem {
    width: 8px;
    background: linear-gradient(to top, #558B2F, #7CB342);
    border-radius: 4px;
    transform-origin: bottom center;
  }

  .sprout .stem {
    height: 0;
    animation: grow-stem-small 1.5s ease-out forwards;
  }

  @keyframes grow-stem-small { to { height: 60px; } }

  .small-leaf {
    position: absolute;
    width: 30px;
    height: 18px;
    background: #66BB6A;
    border-radius: 0 50% 50% 0;
    top: -8px;
    opacity: 0;
    animation: leaf-appear 0.8s ease-out 1s forwards;
  }

  .small-leaf.left {
    right: 4px;
    border-radius: 50% 0 0 50%;
    transform: rotate(-15deg);
  }

  .small-leaf.right {
    left: 4px;
    transform: rotate(15deg);
  }

  @keyframes leaf-appear {
    0% { opacity: 0; transform: scale(0) rotate(0); }
    100% { opacity: 1; transform: scale(1) rotate(15deg); }
  }

  /* Young plant */
  .young-plant {
    position: absolute;
    bottom: -5px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .young-plant .stem {
    height: 0;
    animation: grow-stem-medium 1.5s ease-out forwards;
  }

  @keyframes grow-stem-medium { to { height: 140px; } }

  .leaf {
    position: absolute;
    width: 50px;
    height: 28px;
    background: linear-gradient(135deg, #66BB6A, #43A047);
    border-radius: 0 50% 50% 0;
    opacity: 0;
    box-shadow: inset -2px -2px 4px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
  }

  .leaf:hover {
    filter: brightness(1.2);
    transform: scale(1.15) !important;
  }

  .leaf.left {
    border-radius: 50% 0 0 50%;
    right: 4px;
  }
  .leaf.right { left: 4px; }

  .leaf-1 { top: 10px; animation: leaf-appear 0.8s ease-out 0.8s forwards; }
  .leaf-2 { top: 10px; animation: leaf-appear 0.8s ease-out 1s forwards; }
  .leaf-3 { top: 50px; animation: leaf-appear 0.8s ease-out 1.2s forwards; }
  .leaf-4 { top: 50px; animation: leaf-appear 0.8s ease-out 1.4s forwards; }
  .leaf-5 { top: 90px; animation: leaf-appear 0.8s ease-out 1.6s forwards; }
  .leaf-6 { top: 90px; animation: leaf-appear 0.8s ease-out 1.8s forwards; }

  /* Leaf vein when clicked */
  .leaf-vein {
    position: absolute;
    top: 50%; left: 10%;
    width: 70%;
    height: 2px;
    background: rgba(255,255,255,0.5);
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .leaf.clicked .leaf-vein { opacity: 1; }

  /* Flower */
  .flower-plant {
    position: absolute;
    bottom: -5px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flower-plant .stem {
    height: 0;
    animation: grow-stem-tall 1.5s ease-out forwards;
  }

  @keyframes grow-stem-tall { to { height: 180px; } }

  .flower-head {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    animation: bloom 1s ease-out 1.5s forwards;
  }

  @keyframes bloom {
    0% { transform: translateX(-50%) scale(0) rotate(0); }
    50% { transform: translateX(-50%) scale(1.2) rotate(10deg); }
    100% { transform: translateX(-50%) scale(1) rotate(0); }
  }

  .petal {
    position: absolute;
    width: 28px;
    height: 40px;
    border-radius: 50%;
    transform-origin: center bottom;
    transition: filter 0.2s;
  }

  .petal-yellow { background: linear-gradient(to top, #FFD54F, #FFEE58); }
  .petal-pink { background: linear-gradient(to top, #F48FB1, #F8BBD0); }

  .petal:nth-child(1) { transform: rotate(0deg) translateY(-18px); }
  .petal:nth-child(2) { transform: rotate(45deg) translateY(-18px); }
  .petal:nth-child(3) { transform: rotate(90deg) translateY(-18px); }
  .petal:nth-child(4) { transform: rotate(135deg) translateY(-18px); }
  .petal:nth-child(5) { transform: rotate(180deg) translateY(-18px); }
  .petal:nth-child(6) { transform: rotate(225deg) translateY(-18px); }
  .petal:nth-child(7) { transform: rotate(270deg) translateY(-18px); }
  .petal:nth-child(8) { transform: rotate(315deg) translateY(-18px); }

  .flower-center {
    position: absolute;
    width: 26px;
    height: 26px;
    background: radial-gradient(#795548, #5D4037);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  /* Pollen dots */
  .pollen-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #FFD54F;
    border-radius: 50%;
  }

  /* Bee */
  .bee {
    position: absolute;
    z-index: 20;
    font-size: 36px;
    cursor: grab;
    transition: transform 0.1s;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
  }

  .bee:active { cursor: grabbing; }

  .bee.buzz {
    animation: buzz 0.15s ease-in-out infinite alternate;
  }

  @keyframes buzz {
    0% { transform: translateY(-2px) rotate(-3deg); }
    100% { transform: translateY(2px) rotate(3deg); }
  }

  .bee-path {
    position: absolute;
    z-index: 19;
    pointer-events: none;
  }

  .bee-trail {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #FFD54F;
    border-radius: 50%;
    opacity: 0;
    animation: trail-fade 0.5s ease-out forwards;
  }

  @keyframes trail-fade {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
  }

  /* Fruit */
  .fruit-plant {
    position: absolute;
    bottom: -5px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .fruit-plant .stem {
    height: 0;
    animation: grow-stem-tall 1s ease-out forwards;
  }

  .fruit {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    animation: fruit-grow 1s ease-out 1s forwards;
    cursor: pointer;
    transition: filter 0.2s;
  }

  .fruit:hover { filter: brightness(1.15); }

  @keyframes fruit-grow {
    0% { transform: translateX(-50%) scale(0); }
    70% { transform: translateX(-50%) scale(1.15); }
    100% { transform: translateX(-50%) scale(1); }
  }

  .fruit-body {
    width: 50px;
    height: 55px;
    background: radial-gradient(circle at 35% 35%, #EF5350, #C62828);
    border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
    position: relative;
  }

  .fruit-body::before {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 14px;
    background: #5D4037;
    border-radius: 2px;
  }

  .fruit-leaf-top {
    position: absolute;
    top: -8px; left: 55%;
    width: 18px;
    height: 10px;
    background: #43A047;
    border-radius: 0 80% 0 80%;
    transform: rotate(-10deg);
  }

  .fruit-shine {
    position: absolute;
    top: 12px; left: 14px;
    width: 10px;
    height: 14px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  /* Fruit cross-section */
  .fruit-cross {
    position: absolute;
    top: -30px;
    left: calc(50% + 60px);
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #FFCDD2 30%, #EF5350 70%, #C62828 100%);
    border-radius: 50%;
    transform: scale(0);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 3px solid #C62828;
  }

  .fruit-cross.visible { transform: scale(1); }

  .fruit-cross-seed {
    position: absolute;
    width: 6px;
    height: 8px;
    background: #5D4037;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
  }

  .fruit-cross-seed:nth-child(1) { top: 35%; left: 30%; }
  .fruit-cross-seed:nth-child(2) { top: 35%; right: 30%; }
  .fruit-cross-seed:nth-child(3) { bottom: 25%; left: 42%; }

  .fruit-cross-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 700;
    color: #C62828;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }

  /* Falling seeds */
  .falling-seed {
    position: absolute;
    width: 12px;
    height: 16px;
    background: radial-gradient(ellipse, #8D6E63, #5D4037);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    z-index: 10;
    animation: seed-fall 2s ease-in forwards;
  }

  @keyframes seed-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0); }
    100% { opacity: 0; transform: translateY(200px) rotate(360deg); }
  }

  /* ===== Narrator (Wiggles the Worm) ===== */
  .narrator-area {
    position: absolute;
    bottom: 6%;
    left: 16px;
    z-index: 30;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 400px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .narrator-area.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .narrator-character {
    font-size: 50px;
    flex-shrink: 0;
    animation: worm-wiggle 3s ease-in-out infinite;
    cursor: pointer;
  }

  @keyframes worm-wiggle {
    0%, 100% { transform: rotate(0) translateY(0); }
    25% { transform: rotate(-5deg) translateY(-3px); }
    75% { transform: rotate(5deg) translateY(-3px); }
  }

  .speech-bubble {
    background: white;
    border-radius: 20px;
    padding: 14px 18px;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    font-size: 16px;
    line-height: 1.4;
    color: #333;
    font-weight: 500;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: 12px;
    left: -10px;
    width: 0;
    height: 0;
    border: 8px solid transparent;
    border-right-color: white;
    border-left: 0;
  }

  .speech-bubble .narrator-name {
    font-weight: 800;
    color: #E91E63;
    font-size: 14px;
    display: block;
    margin-bottom: 2px;
  }

  .speech-bubble .fun-fact {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 2px dashed #E8E8E8;
    font-size: 14px;
    color: #666;
  }

  .speech-bubble .fun-fact b {
    color: #FF6F00;
  }

  /* ===== Labels ===== */
  .part-label {
    position: absolute;
    z-index: 12;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s 0.5s;
  }

  .part-label.visible { opacity: 1; }

  .label-tag {
    background: rgba(255,255,255,0.92);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    color: #333;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border: 2px solid;
  }

  .label-line {
    position: absolute;
    width: 2px;
    height: 20px;
    left: 50%;
    transform: translateX(-50%);
  }

  .label-line.above { bottom: 100%; }
  .label-line.below { top: 100%; }

  /* ===== Info Panel ===== */
  .info-panel {
    position: absolute;
    top: 60px;
    right: 16px;
    width: 220px;
    z-index: 15;
    opacity: 0;
    transform: translateX(30px);
    transition: all 0.5s;
    pointer-events: none;
  }

  .info-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .info-card {
    background: rgba(255,255,255,0.92);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  .info-card h3 {
    font-size: 16px;
    color: #2E7D32;
    margin-bottom: 6px;
  }

  .info-card p {
    font-size: 13px;
    color: #555;
    line-height: 1.4;
  }

  .needs-list {
    list-style: none;
    padding: 0;
    margin-top: 8px;
  }

  .needs-list li {
    font-size: 14px;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .needs-list .icon { font-size: 18px; }

  .need-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .need-check.done {
    background: #43A047;
    border-color: #43A047;
    color: white;
  }

  /* ===== Title bar ===== */
  .title-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 20px;
    z-index: 10;
    display: flex;
    justify-content: center;
  }

  .title {
    font-size: 28px;
    font-weight: 800;
    color: white;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
  }

  /* Stage label */
  .stage-label {
    position: absolute;
    bottom: 44%;
    left: 50%;

<script>
/* ===== Audio ===== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, dur, type = 'sine', vol = 0.12) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxPop() { playTone(600, 0.15, 'sine', 0.10); }
function sfxWater() { playTone(300, 0.3, 'triangle', 0.08); setTimeout(() => playTone(350, 0.2, 'triangle', 0.06), 100); }
function sfxGrow() { playTone(400, 0.4, 'sine', 0.08); setTimeout(() => playTone(500, 0.3, 'sine', 0.06), 150); }
function sfxDig() { playTone(150, 0.2, 'square', 0.06); setTimeout(() => playTone(120, 0.15, 'square', 0.04), 100); }
function sfxBloom() { [500,600,700,800].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.07), i*100)); }
function sfxBuzz() { playTone(220, 0.15, 'sawtooth', 0.04); }
function sfxCorrect() { playTone(523, 0.15); setTimeout(() => playTone(659, 0.15), 120); setTimeout(() => playTone(784, 0.2), 240); }
function sfxWrong() { playTone(200, 0.3, 'square', 0.06); }
function sfxCelebrate() {
  [523,587,659,698,784].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.09), i * 120));
}

/* ===== Stage definitions ===== */
const stages = [
  {
    name: "🌰 Seed",
    desc: "Every plant starts as a tiny seed!",
    narrator: "Hi there! I'm Wiggles the worm! Let's plant a seed together! First, tap the shovel to dig a hole in the soil.",
    funFact: "<b>Did you know?</b> A seed has a baby plant inside it called an embryo, plus food to help it start growing!",
    info: { title: "What's a Seed?", text: "A seed is like a tiny backpack! Inside it has a baby plant and food to help it grow. Seeds come in all shapes and sizes.", needs: ["Dig a hole", "Plant the seed"] },
    build: buildSeed,
    interactive: 'dig'
  },
  {
    name: "💧 Water",
    desc: "Seeds need water to wake up and start growing!",
    narrator: "Great job planting! Now the seed needs water. Tap the watering can 3 times! Water helps the seed crack open.",
    funFact: "<b>Did you know?</b> Water makes the seed swell up and crack open. This is called germination!",
    info: { title: "Why Water?", text: "Water soaks into the seed and wakes up the baby plant inside. The seed coat softens and cracks open so the roots can come out!", needs: ["Water 1", "Water 2", "Water 3"] },
    build: buildWatering,
    interactive: 'water'
  },
  {
    name: "☀️ Sunlight",
    desc: "The sprout needs sunshine to make food!",
    narrator: "Look, a little sprout! Now it needs sunshine to make its own food. Tap the sun button to give it light!",
    funFact: "<b>Did you know?</b> Plants use sunlight to turn water and air into sugar! This is called photosynthesis.",
    info: { title: "Photosynthesis", text: "Leaves are like tiny solar panels! They catch sunlight and use it to turn water + air (CO2) into sugar food for the plant.", needs: ["Give sunlight"] },
    build: buildSunlight,
    interactive: 'sun'
  },
  {
    name: "🌿 Growing",
    desc: "The plant grows taller with more leaves!",
    narrator: "Wow, it's getting so tall! Tap the leaves to see what they do. Leaves are where the plant makes food from sunlight!",
    funFact: "<b>Did you know?</b> Leaves have tiny holes called stomata that breathe in air and let out water!",
    info: { title: "Parts of a Plant", text: "Roots drink water from the soil. The stem carries water up. Leaves catch sunlight and make food. Each part has an important job!" },
    build: buildYoungPlant,
    interactive: 'leaves'
  },
  {
    name: "🌸 Flower",
    desc: "The plant blooms beautiful flowers!",
    narrator: "A flower! Flowers aren't just pretty — they help make new seeds. Drag the bee to the flower to spread pollen!",
    funFact: "<b>Did you know?</b> Bees visit over 2,000 flowers every single day! They spread pollen from flower to flower.",
    info: { title: "Pollination", text: "Flowers make pollen (a yellow powder). Bees carry pollen between flowers. This helps the plant make seeds and fruit!" },
    build: buildFlower,
    interactive: 'bee'
  },
  {
    name: "🍎 Fruit & Seeds",
    desc: "The flower becomes fruit with seeds inside!",
    narrator: "The flower turned into a fruit! Inside are brand new seeds. Tap the fruit to see the seeds. The cycle starts all over again!",
    funFact: "<b>Did you know?</b> An apple has about 10 seeds inside! Each one could grow into a whole new apple tree!",
    info: { title: "The Cycle Repeats!", text: "After pollination, the flower becomes a fruit. Inside the fruit are seeds! When seeds fall to the ground, new plants can grow. The cycle never ends!" },
    build: buildFruit,
    interactive: 'fruit'
  }
];

let currentStage = 0;
let visited = new Set();
let waterCount = 0;
const WATER_GOAL = 3;
let digDone = false;
let seedPlanted = false;
let sunGiven = false;
let beePollinated = false;
let fruitTapped = 0;
let leavesClicked = new Set();

/* ===== Init ===== */
function generateGrass() {
  const g = document.getElementById('grass');
  for (let i = 0; i < 80; i++) {
    const b = document.createElement('div');
    b.className = 'grass-blade';
    b.style.left = `${(i / 80) * 100}%`;
    b.style.height = `${25 + Math.random() * 25}px`;
    b.style.animationDelay = `${Math.random() * 2}s`;
    b.style.background = `hsl(${120 + Math.random() * 20}, ${50 + Math.random() * 20}%, ${35 + Math.random() * 15}%)`;
    g.appendChild(b);
  }
}

function generateRain() {
  const r = document.getElementById('rain');
  for (let i = 0; i < 40; i++) {
    const d = document.createElement('div');
    d.className = 'raindrop';
    d.style.left = `${Math.random() * 100}%`;
    d.style.animationDelay = `${Math.random()}s`;
    d.style.animationDuration = `${0.6 + Math.random() * 0.6}s`;
    r.appendChild(d);
  }
}

function generateSunRays() {
  const c = document.getElementById('sunRays');
  for (let i = 0; i < 12; i++) {
    const r = document.createElement('div');
    r.className = 'sun-ray';
    r.style.transform = `rotate(${i * 30}deg) translateY(-58px)`;
    c.appendChild(r);
  }
}

/* ===== Progress ===== */
function buildProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = '';
  const icons = ['🌰','💧','☀️','🌿','🌸','🍎'];
  stages.forEach((_, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'progress-line' + (visited.has(i) ? ' filled' : '');
      p.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentStage ? ' active' : '') + (visited.has(i) ? ' visited' : '');
    dot.textContent = icons[i];
    dot.onclick = () => goToStage(i);
    p.appendChild(dot);
  });
}

/* ===== Controls ===== */
function buildControls() {
  const c = document.getElementById('controls');
  c.innerHTML = '';

  if (currentStage > 0) {
    addBtn(c, 'btn btn-prev', '⬅ Back', () => goToStage(currentStage - 1));
  }

  const s = stages[currentStage];
  if (s.interactive === 'dig') {
    if (!digDone) addBtn(c, 'btn btn-dig', '🪴 Dig a Hole!', doDig);
    else if (!seedPlanted) addBtn(c, 'btn btn-dig', '🌰 Plant the Seed!', doPlantSeed);
    else addBtn(c, 'btn btn-next', 'Next ➡', () => goToStage(currentStage + 1));
  } else if (s.interactive === 'water') {
    addBtn(c, 'btn btn-water', `💧 Water! (${waterCount}/${WATER_GOAL})`, doWater, 'waterBtn');
  } else if (s.interactive === 'sun') {
    if (!sunGiven) addBtn(c, 'btn btn-sun', '☀️ Give Sunlight!', doSunlight);
    else addBtn(c, 'btn btn-next', 'Next ➡', () => goToStage(currentStage + 1));
  } else if (s.interactive === 'leaves') {
    addBtn(c, 'btn btn-next', 'Next ➡', () => goToStage(currentStage + 1));
  } else if (s.interactive === 'bee') {
    if (beePollinated) addBtn(c, 'btn btn-next', 'Next ➡', () => goToStage(currentStage + 1));
  } else if (s.interactive === 'fruit') {
    addBtn(c, 'btn btn-restart', '🔄 Start Over', () => { resetState(); goToStage(0); });
    addBtn(c, 'btn btn-quiz', '🧠 Take the Quiz!', openQuiz);
  }
}

function addBtn(parent, cls, text, fn, id) {
  const b = document.createElement('button');
  b.className = cls;
  b.textContent = text;
  b.onclick = fn;
  if (id) b.id = id;
  parent.appendChild(b);
}

/* ===== Narrator ===== */
function showNarrator(text, fact) {
  const area = document.getElementById('narratorArea');
  document.getElementById('narratorText').textContent = text;
  document.getElementById('funFact').innerHTML = fact || '';
  document.getElementById('funFact').style.display = fact ? 'block' : 'none';
  area.classList.add('visible');
}

function hideNarrator() {
  document.getElementById('narratorArea').classList.remove('visible');
}

function pokeNarrator() {
  const c = document.getElementById('narratorChar');
  c.style.transform = 'scale(1.3) rotate(10deg)';
  sfxPop();
  createStarSparkle(c.getBoundingClientRect());
  setTimeout(() => c.style.transform = '', 300);
}

/* ===== Instruction ===== */
function showInstruction(text) {
  const el = document.getElementById('instruction');
  document.getElementById('instructionText').textContent = text;
  el.classList.add('visible');
}

function hideInstruction() {
  document.getElementById('instruction').classList.remove('visible');
}

/* ===== Info panel ===== */
function showInfo(data) {
  const panel = document.getElementById('infoPanel');
  let needsHTML = '';
  if (data.needs) {
    needsHTML = '<ul class="needs-list">' +
      data.needs.map((n, i) => `<li><div class="need-check" id="need${i}"></div>${n}</li>`).join('') +
      '</ul>';
  }
  panel.innerHTML = `<div class="info-card"><h3>${data.title}</h3><p>${data.text}</p>${needsHTML}</div>`;
  panel.classList.add('visible');
}

function hideInfo() {
  document.getElementById('infoPanel').classList.remove('visible');
}

function checkNeed(index) {
  const el = document.getElementById('need' + index);
  if (el) { el.classList.add('done'); el.textContent = '✓'; }
}

/* ===== Go to stage ===== */
function goToStage(index) {
  currentStage = index;
  visited.add(index);
  const s = stages[index];

  document.getElementById('rain').classList.remove('active');
  document.getElementById('waterDrops').classList.remove('active');
  document.getElementById('badge').classList.remove('show');
  document.getElementById('sunbeam').classList.remove('visible');
  document.getElementById('sky').classList.remove('night');
  hideInstruction();
  hideInfo();
  removeBee();

  document.getElementById('stageName').textContent = s.name;
  document.getElementById('stageDesc').textContent = s.desc;
  const label = document.getElementById('stageLabel');
  label.style.display = 'none';
  void label.offsetHeight;
  label.style.display = '';

  document.getElementById('plantArea').innerHTML = '';
  s.build();
  buildProgress();
  buildControls();
  showNarrator(s.narrator, s.funFact);
  if (s.info) showInfo(s.info);

  if (index >= 4) addButterflies();
  else removeButterflies();

  if (index === stages.length - 1) {
    setTimeout(celebrate, 2500);
  }
}

function resetState() {
  waterCount = 0;
  digDone = false;
  seedPlanted = false;
  sunGiven = false;
  beePollinated = false;
  fruitTapped = 0;
  leavesClicked = new Set();
  visited = new Set();
}

/* ===== Stage 0: Seed (Dig + Plant) ===== */
function buildSeed() {
  digDone = false;
  seedPlanted = false;
  showInstruction('👆 Tap "Dig a Hole" to start!');
}

function doDig() {
  sfxDig();
  const area = document.getElementById('plantArea');

  // Show hole
  const hole = document.createElement('div');
  hole.className = 'dirt-hole';
  area.appendChild(hole);
  setTimeout(() => hole.classList.add('visible'), 50);

  // Dirt pile
  const pile = document.createElement('div');
  pile.className = 'dirt-pile';
  pile.innerHTML = '<div class="dirt-chunk"></div><div class="dirt-chunk"></div><div class="dirt-chunk"></div>';
  pile.style.left = '50%';
  pile.style.transform = 'translateX(calc(-50% + 50px))';
  area.appendChild(pile);
  setTimeout(() => pile.classList.add('visible'), 200);

  createDirtParticles(area);
  digDone = true;
  checkNeed(0);
  showInstruction('🌰 Now tap "Plant the Seed"!');
  buildControls();
}

function createDirtParticles(area) {
  const rect = area.getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'sparkle';
    p.style.left = `${rect.left + rect.width/2 + (Math.random()-0.5)*60}px`;
    p.style.top = `${rect.bottom - 30}px`;
    p.style.background = '#8D6E63';
    p.style.width = '10px';
    p.style.height = '10px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function doPlantSeed() {
  sfxPop();
  const area = document.getElementById('plantArea');

  const seed = document.createElement('div');
  seed.className = 'seed seed-planted';
  area.appendChild(seed);

  seedPlanted = true;
  checkNeed(1);
  showInstruction('🎉 Seed planted! Let\'s water it!');
  createStarSparkle(area.getBoundingClientRect());

  setTimeout(() => buildControls(), 500);
}

/* ===== Stage 1: Water ===== */
function buildWatering() {
  waterCount = 0;
  const area = document.getElementById('plantArea');
  const seed = document.createElement('div');
  seed.className = 'seed';
  seed.style.transform = 'translateY(12px) scale(0.85)';
  seed.style.opacity = '0.7';
  area.appendChild(seed);

  showInstruction('💧 Tap "Water" 3 times!');
}

function doWater() {
  sfxWater();
  waterCount++;
  const btn = document.getElementById('waterBtn');
  if (btn) btn.textContent = `💧 Water! (${waterCount}/${WATER_GOAL})`;

  document.getElementById('waterDrops').classList.add('active');
  setTimeout(() => document.getElementById('waterDrops').classList.remove('active'), 1200);
  document.getElementById('rain').classList.add('active');
  setTimeout(() => document.getElementById('rain').classList.remove('active'), 1500);

  checkNeed(waterCount - 1);
  const area = document.getElementById('plantArea');
  createSparklesAt(area.getBoundingClientRect(), ['#64B5F6','#42A5F5','#90CAF9']);

  // Seed swells
  const seed = area.querySelector('.seed');
  if (seed) {
    const scale = 0.85 + waterCount * 0.06;
    seed.style.transform = `translateY(${12 - waterCount*3}px) scale(${scale})`;
    seed.style.opacity = `${0.7 + waterCount * 0.1}`;
  }

  if (waterCount >= WATER_GOAL) {
    showInstruction('🌱 The seed is ready to sprout!');
    sfxGrow();
    setTimeout(() => goToStage(currentStage + 1), 1000);
  }
}

/* ===== Stage 2: Sunlight ===== */
function buildSunlight() {
  sunGiven = false;
  const area = document.getElementById('plantArea');
  const sprout = document.createElement('div');
  sprout.className = 'sprout';
  sprout.innerHTML = `
    <div class="stem"></div>
    <div class="small-leaf left"></div>
    <div class="small-leaf right"></div>
  `;
  area.appendChild(sprout);

  // Roots
  const roots = document.createElement('div');
  roots.className = 'roots visible';
  roots.innerHTML = `
    <div class="root-line"><div class="root-branch left"></div><div class="root-branch right"></div></div>
    <div class="root-line"><div class="root-branch left"></div></div>
    <div class="root-line"><div class="root-branch right"></div></div>
  `;
  area.appendChild(roots);
  setTimeout(() => roots.querySelectorAll('.root-line').forEach(r => r.classList.add('grown')), 300);

  showInstruction('☀️ Tap "Give Sunlight"!');
}

function doSunlight() {
  sfxGrow();
  sunGiven = true;
  document.getElementById('sunbeam').classList.add('visible');
  checkNeed(0);

  const sun = document.getElementById('sun');
  const face = document.getElementById('sunFace');
  face.textContent = '😄';
  sun.style.boxShadow = '0 0 100px #FFD54F, 0 0 200px #FFE082';

  showInstruction('🌞 The plant loves sunlight!');
  createStarSparkle(document.getElementById('plantArea').getBoundingClientRect());

  setTimeout(() => {
    sun.style.boxShadow = '';
    face.textContent = '😊';

/* ===== Stage 3: Growing (click leaves) ===== */
function buildYoungPlant() {
  leavesClicked = new Set();
  const area = document.getElementById('plantArea');
  const plant = document.createElement('div');
  plant.className = 'young-plant';
  plant.innerHTML = `
    <div class="stem">
      <div class="leaf left leaf-1" onclick="clickLeaf(this, 0)"><div class="leaf-vein"></div></div>
      <div class="leaf right leaf-2" onclick="clickLeaf(this, 1)"><div class="leaf-vein"></div></div>
      <div class="leaf left leaf-3" onclick="clickLeaf(this, 2)"><div class="leaf-vein"></div></div>
      <div class="leaf right leaf-4" onclick="clickLeaf(this, 3)"><div class="leaf-vein"></div></div>
      <div class="leaf left leaf-5" onclick="clickLeaf(this, 4)"><div class="leaf-vein"></div></div>
      <div class="leaf right leaf-6" onclick="clickLeaf(this, 5)"><div class="leaf-vein"></div></div>
    </div>
  `;
  area.appendChild(plant);

  // Roots
  const roots = document.createElement('div');
  roots.className = 'roots visible';
  roots.innerHTML = `
    <div class="root-line grown"><div class="root-branch left"></div><div class="root-branch right"></div></div>
    <div class="root-line grown"><div class="root-branch left"></div></div>
    <div class="root-line grown"><div class="root-branch right"></div></div>
  `;
  area.appendChild(roots);

  sfxGrow();
  showInstruction('🍃 Tap the leaves to learn about them!');
}

const leafFacts = [
  "🍃 Leaves catch sunlight like tiny solar panels!",
  "💨 Leaves breathe in CO2 from the air!",
  "💧 Leaves pull water up from the roots!",
  "🍬 Leaves make sugar food for the plant!",
  "🌬️ Tiny holes in leaves let water out — it's called transpiration!",
  "🟢 Leaves are green because of chlorophyll!"
];

function clickLeaf(el, idx) {
  sfxPop();
  el.classList.add('clicked');
  leavesClicked.add(idx);
  createStarSparkle(el.getBoundingClientRect());

  // Show floating fact
  const fact = leafFacts[idx];
  showInstruction(fact);
  setTimeout(() => {
    if (leavesClicked.size < 6) showInstruction('🍃 Tap more leaves!');
    else showInstruction('🎉 You found all the leaf facts!');
  }, 2500);
}

/* ===== Stage 4: Flower + Bee ===== */
function buildFlower() {
  beePollinated = false;
  const area = document.getElementById('plantArea');
  const plant = document.createElement('div');
  plant.className = 'flower-plant';

  let petals = '';
  for (let i = 0; i < 8; i++) {
    const c = i % 2 === 0 ? 'petal-yellow' : 'petal-pink';
    petals += `<div class="petal ${c}"></div>`;
  }

  plant.innerHTML = `
    <div class="stem">
      <div class="leaf left leaf-3"></div>
      <div class="leaf right leaf-4"></div>
      <div class="leaf left leaf-5"></div>
      <div class="leaf right leaf-6"></div>
    </div>
    <div class="flower-head" id="flowerHead">
      ${petals}
      <div class="flower-center" id="flowerCenter"></div>
    </div>
  `;
  area.appendChild(plant);

  sfxBloom();

  // Add bee after bloom
  setTimeout(() => {
    addBee();
    showInstruction('🐝 Drag the bee to the flower!');
  }, 2600);
}

function addBee() {
  removeBee();
  const bee = document.createElement('div');
  bee.className = 'bee buzz';
  bee.id = 'bee';
  bee.textContent = '🐝';
  bee.style.top = '25%';
  bee.style.left = '15%';
  document.getElementById('scene').appendChild(bee);

  // Drag
  let dragging = false;
  let offX, offY;

  function onDown(e) {
    e.preventDefault();
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    const r = bee.getBoundingClientRect();
    offX = p.clientX - r.left;
    offY = p.clientY - r.top;
    bee.classList.remove('buzz');
    sfxBuzz();
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    bee.style.left = `${p.clientX - offX}px`;
    bee.style.top = `${p.clientY - offY}px`;
    bee.style.position = 'fixed';

    // Trail
    const trail = document.createElement('div');
    trail.className = 'bee-trail';
    trail.style.position = 'fixed';
    trail.style.left = `${p.clientX}px`;
    trail.style.top = `${p.clientY}px`;
    document.body.appendChild(trail);
    setTimeout(() => trail.remove(), 500);
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    bee.classList.add('buzz');

    // Check if near flower
    const flowerCenter = document.getElementById('flowerCenter');
    if (flowerCenter) {
      const bR = bee.getBoundingClientRect();
      const fR = flowerCenter.getBoundingClientRect();
      const dist = Math.hypot(
        (bR.left + bR.width/2) - (fR.left + fR.width/2),
        (bR.top + bR.height/2) - (fR.top + fR.height/2)
      );
      if (dist < 80) {
        doPollinate();
      }
    }
  }

  bee.addEventListener('mousedown', onDown);
  bee.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);

  bee._cleanup = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
  };
}

function removeBee() {
  const bee = document.getElementById('bee');
  if (bee) {
    if (bee._cleanup) bee._cleanup();
    bee.remove();
  }
}

function doPollinate() {
  if (beePollinated) return;
  beePollinated = true;
  sfxCelebrate();

  // Pollen explosion
  const fc = document.getElementById('flowerCenter');
  if (fc) {
    const r = fc.getBoundingClientRect();
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'sparkle';
      p.style.left = `${r.left + r.width/2 + (Math.random()-0.5)*60}px`;
      p.style.top = `${r.top + r.height/2 + (Math.random()-0.5)*60}px`;
      p.style.background = '#FFD54F';
      p.style.width = '8px';
      p.style.height = '8px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
  }

  showInstruction('🎉 Pollination complete! The bee spread pollen!');
  createStarSparkle(document.getElementById('plantArea').getBoundingClientRect());

  setTimeout(() => {
    removeBee();
    buildControls();
  }, 1200);
}

/* ===== Stage 5: Fruit ===== */
function buildFruit() {
  fruitTapped = 0;
  const area = document.getElementById('plantArea');
  const plant = document.createElement('div');
  plant.className = 'fruit-plant';

  plant.innerHTML = `
    <div class="stem">
      <div class="leaf left leaf-3"></div>
      <div class="leaf right leaf-4"></div>
      <div class="leaf left leaf-5"></div>
      <div class="leaf right leaf-6"></div>
    </div>
    <div class="fruit" onclick="tapFruit(this)">
      <div class="fruit-body">
        <div class="fruit-leaf-top"></div>
        <div class="fruit-shine"></div>
      </div>
    </div>
    <div class="fruit-cross" id="fruitCross">
      <div class="fruit-cross-seed"></div>
      <div class="fruit-cross-seed"></div>
      <div class="fruit-cross-seed"></div>
      <div class="fruit-cross-label">Seeds inside!</div>
    </div>
  `;
  area.appendChild(plant);

  showInstruction('🍎 Tap the fruit to see what\'s inside!');
}

function tapFruit(el) {
  fruitTapped++;
  sfxPop();

  if (fruitTapped === 1) {
    // Show cross section
    document.getElementById('fruitCross').classList.add('visible');
    showInstruction('🌰 Look! Seeds inside! Tap again to scatter them!');
    createStarSparkle(el.getBoundingClientRect());
  } else {
    dropSeeds(el);
    showInstruction('🎉 New seeds! The life cycle starts again!');
  }
}

function dropSeeds(el) {
  sfxGrow();
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const seed = document.createElement('div');
    seed.className = 'falling-seed';
    seed.style.left = `${rect.left + Math.random() * rect.width}px`;
    seed.style.top = `${rect.bottom}px`;
    seed.style.animationDelay = `${i * 0.12}s`;
    document.body.appendChild(seed);
    setTimeout(() => seed.remove(), 2500);
  }
  createSparklesAt(rect);
}

/* ===== Effects ===== */
function createSparkles(el) { createSparklesAt(el.getBoundingClientRect()); }

function createSparklesAt(rect, colors) {
  const cols = colors || ['#FFD54F', '#FF7043', '#AB47BC', '#42A5F5', '#66BB6A'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = `${rect.left + Math.random() * rect.width}px`;
    s.style.top = `${rect.top + Math.random() * rect.height}px`;
    s.style.background = cols[Math.floor(Math.random() * cols.length)];
    s.style.animationDelay = `${Math.random() * 0.3}s`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function createStarSparkle(rect) {
  const stars = ['⭐','✨','💫','🌟'];
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'star-sparkle';
    s.textContent = stars[i % stars.length];
    s.style.left = `${rect.left + Math.random() * rect.width}px`;
    s.style.top = `${rect.top + Math.random() * rect.height}px`;
    s.style.animationDelay = `${i * 0.1}s`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function clickSun() {
  const face = document.getElementById('sunFace');
  face.textContent = ['😄','🤩','😎','🥳'][Math.floor(Math.random() * 4)];
  sfxPop();
  createStarSparkle(document.getElementById('sun').getBoundingClientRect());
  setTimeout(() => face.textContent = '😊', 1500);
}

function addButterflies() {
  removeButterflies();
  for (let i = 0; i < 2; i++) {
    const bf = document.createElement('div');
    bf.className = 'butterfly';
    bf.style.top = `${15 + Math.random() * 25}%`;
    bf.style.left = `${20 + Math.random() * 50}%`;
    bf.style.animationDelay = `${i * 3}s`;
    bf.innerHTML = `<span class="butterfly-wing">🦋</span>`;
    document.getElementById('scene').appendChild(bf);
  }
}

function removeButterflies() {
  document.querySelectorAll('.butterfly').forEach(b => b.remove());
}

function celebrate() {
  sfxCelebrate();
  const colors = ['#FF5252','#FF4081','#7C4DFF','#448AFF','#69F0AE','#FFD740','#FF6E40'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = `${Math.random() * 100}%`;
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = `${8 + Math.random() * 10}px`;
    c.style.height = `${8 + Math.random() * 10}px`;
    c.style.animationDelay = `${Math.random() * 2}s`;
    c.style.animationDuration = `${2 + Math.random() * 2}s`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
  setTimeout(() => document.getElementById('badge').classList.add('show'), 600);
}

/* ===== Quiz ===== */
const quizQuestions = [
  {
    q: "What is the very first stage of a plant's life?",
    opts: ["Flower", "Seed", "Fruit", "Leaf"],
    answer: 1
  },
  {
    q: "What does a seed need to start growing?",
    opts: ["Candy", "Water", "Snow", "Paint"],
    answer: 1
  },
  {
    q: "What do leaves use to make food?",
    opts: ["Moonlight", "Sunlight", "Starlight", "Flashlight"],
    answer: 1
  },
  {
    q: "Who helps spread pollen between flowers?",
    opts: ["Fish", "Bees", "Cats", "Snakes"],
    answer: 1
  },
  {
    q: "What grows after a flower is pollinated?",
    opts: ["More flowers", "A fruit with seeds", "A rock", "A cloud"],
    answer: 1
  },
  {
    q: "What is the process called when plants use sunlight to make food?",
    opts: ["Sleeping", "Photosynthesis", "Dancing", "Swimming"],
    answer: 1
  },
  {
    q: "What part of the plant drinks water from the soil?",
    opts: ["Petals", "Leaves", "Roots", "Flowers"],
    answer: 2
  },
  {
    q: "What happens to the seed when it gets water?",
    opts: ["It floats away", "It cracks open and a sprout grows", "It turns into a rock", "It disappears"],
    answer: 1
  }
];

let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;
let shuffledQuiz = [];

function openQuiz() {
  document.getElementById('badge').classList.remove('show');
  shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5).slice(0, 5);
  quizIndex = 0;
  quizScore = 0;
  showQuizQuestion();
  document.getElementById('quizOverlay').classList.add('visible');
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('visible');
}

function showQuizQuestion() {
  quizAnswered = false;
  const q = shuffledQuiz[quizIndex];
  document.getElementById('quizTitle').textContent = '🧠 Plant Quiz!';
  document.getElementById('quizProgress').textContent = `Question ${quizIndex + 1} of ${shuffledQuiz.length}`;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNextBtn').style.display = 'none';

  const optsEl = document.getElementById('quizOptions');
  optsEl.innerHTML = '';

  // Shuffle options but track correct answer
  const indices = q.opts.map((_, i) => i).sort(() => Math.random() - 0.5);
  const correctShuffled = indices.indexOf(q.answer);

  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = q.opts[origIdx];
    btn.onclick = () => answerQuiz(btn, displayIdx, correctShuffled);
    optsEl.appendChild(btn);
  });
}

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;

  const opts = document.querySelectorAll('.quiz-option');
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quizResult').innerHTML = '<span style="color:#2E7D32">✅ Correct! Great job!</span>';
    sfxCorrect();
  } else {
    btn.classList.add('wrong');
    opts[correct].classList.add('correct');
    document.getElementById('quizResult').innerHTML = '<span style="color:#C62828">❌ Not quite! The green one is right.</span>';
    sfxWrong();
  }

  document.getElementById('quizNextBtn').style.display = 'inline-block';
  document.getElementById('quizNextBtn').textContent = quizIndex < shuffledQuiz.length - 1 ? 'Next Question' : 'See Results!';
}

function nextQuizQuestion() {
  quizIndex++;
  if (quizIndex < shuffledQuiz.length) {
    showQuizQuestion();
  } else {
    showQuizResults();
  }
}

function showQuizResults() {
  const pct = Math.round((quizScore / shuffledQuiz.length) * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 60 ? '🌟' : '🌱';
  const msg = pct === 100 ? 'Perfect score! You\'re a Plant Genius!' : pct >= 60 ? 'Great job! You know your plants!' : 'Good try! Review the stages and try again!';

  document.getElementById('quizTitle').textContent = 'Quiz Complete!';
  document.getElementById('quizProgress').textContent = '';
  document.getElementById('quizQuestion').innerHTML = `<div style="text-align:center"><div class="quiz-score">${emoji}</div><div style="font-size:28px;font-weight:800">${quizScore} / ${shuffledQuiz.length}</div></div>`;
  document.getElementById('quizOptions').innerHTML = `<div style="text-align:center;font-size:18px;color:#555">${msg}</div>`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNextBtn').textContent = '🔄 Play Again';
  document.getElementById('quizNextBtn').style.display = 'inline-block';
  document.getElementById('quizNextBtn').onclick = () => { openQuiz(); document.getElementById('quizNextBtn').onclick = nextQuizQuestion; };

  if (pct === 100) sfxCelebrate();
}

/* ===== Start ===== */
function startApp() {
  ensureAudio();
  document.getElementById('introScreen').classList.add('hidden');
  goToStage(0);
}

generateGrass();
generateRain();
generateSunRays();
</script>
